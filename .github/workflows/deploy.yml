name: Deploy to Hetzner

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "docker-compose.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            cd /app
            git pull origin main
            docker compose up -d --build api
            docker image prune -f
